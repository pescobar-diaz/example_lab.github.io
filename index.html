<!DOCTYPE html>
<html>
<head>
<title>Munday Lab</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
}

.section{
max-width:900px;
margin:40px auto;
padding:0 20px;
}

.hero{
height:50vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#f5f5f5;
}
</style>

</head>

<body>

<div class="hero">
<h1>Munday Lab</h1>
<p>At the intersection of quantum science and energy technologies</p>
</div>

<div class="section">
<h2>Lab Updates</h2>
<div id="bluesky-feed">Loading updates...</div>
</div>

<script>
async function loadBluesky(){

try{

const res = await fetch(
"https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=mundaylab.bsky.social&limit=3"
);

const data = await res.json();

const container = document.getElementById("bluesky-feed");
container.innerHTML = "";

data.feed.forEach(item => {

const div = document.createElement("div");

div.innerText = item.post.record.text;

container.appendChild(div);

});

}catch(error){

console.error(error);
document.getElementById("bluesky-feed").innerText = "Failed to load updates";

}

}

loadBluesky();
</script>

</body>
</html>
