<!DOCTYPE html>
<html>
<head>
<title>Munday Lab</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
}

.section{
max-width:900px;
margin:40px auto;
padding:0 20px;
}

.hero{
height:50vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#f5f5f5;
}
</style>

</head>

<body>

<div class="hero">
<h1>Munday Lab</h1>
<p>At the intersection of quantum science and energy technologies</p>
</div>

<div class="section">
<h2>Lab Updates</h2>
<div id="bluesky-feed">Loading updates...</div>
</div>

<script>
async function loadBluesky(){

try{

const res = await fetch(
"https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=mundaylab.bsky.social&limit=3"
);

const data = await res.json();

const container = document.getElementById("bluesky-feed");
container.innerHTML = "";

data.feed.forEach(item => {

const post = document.createElement("div");
post.style.display = "flex";
post.style.gap = "16px";
post.style.padding = "16px 0";
post.style.borderBottom = "1px solid #eee";

// IMAGE (safe check)
if(item.post.embed && item.post.embed.images){
const img = document.createElement("img");
img.src = item.post.embed.images[0].thumb;
img.style.width = "90px";
img.style.height = "90px";
img.style.objectFit = "cover";
post.appendChild(img);
}

// CONTENT
const content = document.createElement("div");

// CLEAN TEXT
let text = item.post.record.text
.replace(/#\w+/g,"")
.replace(/@\S+/g,"");

// convert links to clickable HTML
text = text.replace(
/((https?:\/\/)?(www\.)?[^\s]+\.[^\s]+)/g,
function(url){

// if missing https → add it
let fullUrl = url.startsWith("http") ? url : "https://" + url;

return '<a href="' + fullUrl + '" target="_blank" style="color:#2a6ebb;">Read link →</a>';

}
);

// TEXT
const title = document.createElement("div");
title.style.fontSize = "16px";
title.style.marginBottom = "5px";
title.innerText = text;

// DATE
const date = document.createElement("div");
date.style.fontSize = "13px";
date.style.color = "#777";
date.innerText = new Date(item.post.record.createdAt)
.toLocaleDateString("en-US",{
month:"short",
day:"numeric",
year:"numeric"
});

content.appendChild(title);
content.appendChild(date);

post.appendChild(content);
container.appendChild(post);

});

}catch(error){

console.error(error);
document.getElementById("bluesky-feed").innerText = "Failed to load updates";

}

}

loadBluesky();
</script>

</body>
</html>
